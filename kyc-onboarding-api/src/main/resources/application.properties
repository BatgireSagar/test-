spring.application.name=kyc-onboarding-api

# Spring Datasource
spring.datasource.url=jdbc:postgresql://localhost:5432/kycdb
spring.datasource.username=kycuser
spring.datasource.password=kycpass
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# App
server.port=8080
