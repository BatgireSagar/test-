name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  java-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-gateway, validation-engine]
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Build and test ${{ matrix.service }}
        run: |
          cd kyc-onboarding/${{ matrix.service }}
          mvn clean install

  python-services:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ocr-service, llm-rule-engine]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - name: Install dependencies and lint ${{ matrix.service }}
        run: |
          cd kyc-onboarding/${{ matrix.service }}
          pip install -r requirements.txt
          python -m compileall .

  node-ui:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install and lint Ops UI
        run: |
          cd kyc-onboarding/ops-ui
          npm install --legacy-peer-deps
          npm run build